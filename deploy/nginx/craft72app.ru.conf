# Stage 3 include for the existing Certbot-managed HTTPS `server` block.
# Do not install this file as a complete virtual host. Copy it to
# /etc/nginx/snippets/craft72app.ru-stage3.conf and add exactly this line inside the
# existing TLS server block for craft72app.ru:
#   include /etc/nginx/snippets/craft72app.ru-stage3.conf;

root /home/mun/apps/craft72-max-app/current;
index index.html;

location = /api {
    return 404;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

location ^~ /api/ {
    proxy_pass http://127.0.0.1:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_connect_timeout 3s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    client_max_body_size 1m;
    proxy_hide_header X-Powered-By;
    add_header Cache-Control "no-store" always;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

location = /health {
    return 404;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

location ^~ /health/ {
    proxy_pass http://127.0.0.1:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_connect_timeout 2s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
    proxy_hide_header X-Powered-By;
    add_header Cache-Control "no-store" always;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

# Never expose server-side release content through the static fallback.
location ~ ^/(?:deploy|scripts)(?:/|$) {
    return 404;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

location = /privacy.html {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

location = /terms.html {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

# Portfolio filenames are stable, so use bounded revalidation rather than immutable caching.
location ^~ /portfolio/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

# Vite asset filenames include content hashes and can be cached immutably.
location ^~ /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

location = /release-id.txt {
    try_files $uri =404;
    add_header Cache-Control "no-store" always;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}

location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
    include /etc/nginx/snippets/craft72app.ru-security-headers.conf;
}
